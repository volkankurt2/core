domain: [domain-id]               # Küçük harf, tire ile (örn: payment, credit, platform)
display_name: '[Domain Adı]'       # İnsan okunabilir ad
version: '1.0'
description: '[Domain açıklaması]'

# Jira proje kodu (Jira Creator agent tarafından kullanılır)
jira_project: [JIRA_KEY]           # Örn: PAY, CRED, PLAT
# Confluence space kodu (genellikle Jira key ile aynı)
confluence_space: [CONFLUENCE_KEY]

# ─────────────────────────────────────────────
# Servisler — Codebase Analyst agent için
# Her servis için knowledge-base/[id].json oluşturun (repo-scanner ile)
# ─────────────────────────────────────────────
services:
  - id: [servis-id]
    name: [Servis Adı]
    description: [Servisin ne yaptığı — kısa açıklama]
    tech: [Teknoloji stack — örn: Java 21 / Spring Boot]
    criticality: P0    # P0: kritik, P1: önemli, P2: düşük
    owner_team: [Ekip adı]
    kb: knowledge-base/[servis-id].json
  # - id: [servis-2]
  #   name: [Servis 2]
  #   ...

# ─────────────────────────────────────────────
# Regülasyonlar — PRD Reviewer + Interview Agent için
# Sektörünüzün yasal gereksinimlerini buraya ekleyin
# ─────────────────────────────────────────────
regulations:
  - id: [REGÜLASYON_ID]
    scope: [Hangi işlemler/sistemler kapsanıyor]
    risk_if_missed: [Uyumsuzlukta ne olur]
    analyst_checklist:
      - '[Analistin kontrol etmesi gereken soru 1]'
      - '[Analistin kontrol etmesi gereken soru 2]'
  # - id: [REGÜLASYON_2]
  #   ...

# ─────────────────────────────────────────────
# Domain-Spesifik Etki Alanları — Codebase Analyst için
# Bu domain'e özgü etki analizi başlıklarını tanımlar.
# Örn: fiziksel cihazlar, üçüncü taraf sistemler, ofis ağı vb.
# ─────────────────────────────────────────────
special_impact_areas: []
  # - id: [alan-id]
  #   title: '[Etki Alanı Başlığı]'         # Örn: POS Cihaz Etkisi, ATM Uyumluluğu
  #   description: '[Neyi analiz etmeli?]'  # Agent'a yönlendirme metni

# ─────────────────────────────────────────────
# Domain-spesifik PRD kontrol kriterleri
# PRD Reviewer'ın standart listesine ek olarak uygulanır
# ─────────────────────────────────────────────
prd_review_extra_criteria:
  mandatory:                        # Bu eksikse PRD geçemez
    - '[Zorunlu kriter 1]'
    - '[Zorunlu kriter 2]'
  warning:                          # Eksikse uyarı verilir
    - '[Tavsiye edilen kriter 1]'

# ─────────────────────────────────────────────
# Test senaryosu şablonları
# Implementation Planner'a zorunlu kapsam olarak geçilir
# ─────────────────────────────────────────────
test_scenario_templates:
  - '[Temel happy path senaryosu]'
  - '[Hata/istisna senaryosu]'
  - '[Sınır değer senaryosu]'
  - '[Entegrasyon/servis down senaryosu]'

# ─────────────────────────────────────────────
# Birlikte Çalışılan Board'lar (Collaborating Boards)
# Tasklar eşleşen board'a yönlendirilir.
# Eşleşme yoksa domain'in ana jira_project'i kullanılır.
#
# triggers.keywords  → story başlık/açıklamasında bu kelimeler varsa
# triggers.owner_teams → impact-analysis.md'de etkilenen ekip adı eşleşirse
# ─────────────────────────────────────────────
collaborating_boards: []
  # /core-setup-boards komutu bu bölümü otomatik doldurur.
  # Manuel eklemek için örnek:
  #
  # - id: mobile-vendor               # Benzersiz ID (küçük harf, tire)
  #   jira_project: MOB               # Hedef Jira proje kodu
  #   display_name: Mobil Dış Kaynak
  #   purpose: >                      # Bu board ne iş yapıyor? (agentlar bu metni okur)
  #     iOS ve Android mobil uygulama geliştirme board'u.
  #     Push notification, deep link ve app store süreçlerini yönetir.
  #   issue_types: [Story, Bug, Task] # Bu board'da hangi issue tipleri açılır
  #   triggers:
  #     keywords:                     # Story içeriğinde geçen anahtar kelimeler
  #       - ios
  #       - android
  #       - mobil
  #     owner_teams:                  # impact-analysis.md'deki etkilenen ekip adları
  #       - Mobile
  #       - iOS Team

# ─────────────────────────────────────────────
# Sözlük — tüm agentlar için bağlam
# Domain'e özel terimler ve kısaltmalar
# ─────────────────────────────────────────────
glossary:
  - term: '[Terim]'
    definition: '[Açıklama]'
  # - term: '[Terim 2]'
  #   definition: '[Açıklama 2]'
