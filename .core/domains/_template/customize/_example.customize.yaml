# CORE — Agent Customize Overlay
# Bu dosya .core/agents/*.agent.md dosyalarını DEĞİŞTİRMEZ — üzerine katman ekler.
# domains/[domain-id]/customize/[agent-id].customize.yaml olarak kopyala ve düzenle.
#
# Kullanım:
#   cp .core/domains/_template/customize/_example.customize.yaml \
#      domains/[domain-id]/customize/prd.customize.yaml
#
# Desteklenen agent ID'leri:
#   interview | prd | prd-reviewer | codebase-analyst | implementation-plan
#   jira-creator | feedback-collector | repo-scanner | dev-advisor

agent: [agent-id]   # Hangi agent için (örn: prd)

# ─────────────────────────────────────────────
# extra_rules — base agent'ın <rules> listesine EKLENIR, replace etmez
# ─────────────────────────────────────────────
extra_rules:
  - "[Şirkete özgü zorunlu kural]"
  # - "Her PRD'de KVKK uyumluluk bölümü zorunlu"
  # - "Finansal işlemlerde audit log gereksinimi belirtilmeli"

# ─────────────────────────────────────────────
# extra_context — agent persona'sına EKLENIR
# "Bu domain'de özellikle dikkat et..." şeklinde ek bağlam
# ─────────────────────────────────────────────
extra_context: |
  # [Domain ve şirkete özgü bağlam — agent her oturumda okur]
  # Örn: "Fintech düzenleyici ortamında çalışıyorsun. Her dokümanda
  # regülasyon referansı zorunlu. Müşteri verisi işleme hassasiyeti yüksek."

# ─────────────────────────────────────────────
# workflow_injections — agent workflow adımlarına ek step enjekte et
# after_step_N: N. adım tamamlandıktan SONRA bu adımlar çalışır
# before_step_N: N. adım başlamadan ÖNCE bu adımlar çalışır
# ─────────────────────────────────────────────
workflow_injections: {}
  # after_step_1:
  #   - "Regülasyon ön kontrolü: domain-context.yaml → regulations listesi ile karşılaştır"
  # after_step_3:
  #   - "KVKK veri işleme bölümünü ekle"
  #   - "PCI-DSS kapsam kontrolü yap"

# ─────────────────────────────────────────────
# memories — agent'ın her oturumda bilmesi gereken domain gerçekleri
# ─────────────────────────────────────────────
memories: []
  # - "Prod deploy'lar Salı-Perşembe 10:00-16:00 arası"
  # - "API versiyonlama: yeni entegrasyonlarda v2 zorunlu"
  # - "Test ortamı: staging.internal.company.com"
  # - "On-call ekip: #platform-oncall Slack kanalı"

# ─────────────────────────────────────────────
# output_additions — agent çıktı dokümanına ek bölüm ekle
# Bölüm adı ve içerik şablonu belirt
# ─────────────────────────────────────────────
output_additions: []
  # - section: "Regülasyon Uyumluluk"
  #   after: "Kısıtlar"    # Hangi bölümden sonra eklenir
  #   template: |
  #     ## Regülasyon Uyumluluk
  #     | Regülasyon | Kapsam | Durum |
  #     |-----------|--------|-------|
  #     | [domain-context.yaml → regulations[0].id] | ... | ☐ Kontrol edilecek |
